services:
  homarr:
    container_name: homarr
    image: ghcr.io/homarr-labs/homarr:latest
    restart: unless-stopped
    volumes:
      - /volume2/docker/homarr/appdata:/appdata
    env_file:
      - /env/homarr.env
    environment:
      - TZ=Europe/Berlin
    networks:
      - traefik
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - traefik.enable=true
      - traefik.http.routers.homarr.rule=Host(`homarr.example.com`) || Host(`example.com`)
      - traefik.http.routers.homarr.middlewares=no-auth@file
      - traefik.http.services.homarr-homarr.loadbalancer.server.port=7575 #dont change it!!

networks:
  traefik:
    name: traefik
    external: true